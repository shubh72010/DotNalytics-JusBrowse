services:
  - type: static_site
    name: DotNalytics-JusBrowse
    buildCommand: bash -c 'cp index.html index.html.bak && sed -i "s|https://YOUR_PROJECT_ID\.supabase\.co|$SUPABASE_URL|g" index.html && sed -i "s|YOUR_ANON_KEY|$SUPABASE_ANON_KEY|g" index.html && sed -i "s|\"usage_stats\"|\"${TABLE_NAME:-usage_stats}\"|g" index.html && echo "✅ Build complete"'
    staticPublishPath: .
    envVars:
      - key: SUPABASE_URL
        scope: build
      - key: SUPABASE_ANON_KEY
        scope: build
      - key: TABLE_NAME
        scope: build
        value: usage_stats
