services:
  - type: static_site
    name: DotNalytics-JusBrowse
    buildCommand: chmod +x build.sh && ./build.sh
    staticPublishPath: .
    envVars:
      - key: SUPABASE_URL
        scope: build
      - key: SUPABASE_ANON_KEY
        scope: build
      - key: TABLE_NAME
        scope: build
        value: usage_stats
